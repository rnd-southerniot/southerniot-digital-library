name: Validate DPL Library

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validator:
    name: validator
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Run validator
        run: make validate

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: out/validation-report.json
          if-no-files-found: error
          retention-days: 30

  fixtures:
    name: fixtures
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Run validator fixtures
        run: make test

  index-build:
    name: index-build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Build search index
        run: make index

  export-smoke:
    name: export-smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Run field-pack export smoke test
        run: make export-smoke

      - name: Upload export smoke outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            out/release-smoke/*.zip
            out/release-smoke/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
