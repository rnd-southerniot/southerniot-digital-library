openapi: 3.1.0
info:
  title: SouthernIoT CRM/DPL Backend Contract
  version: 0.1.0
  description: >
    Minimal service boundary for CRM ingestion, DPL search, and field-pack export.
    Aligned to the phase-1 CTO architecture from SOU-22.
servers:
  - url: https://api.southerniot.example
paths:
  /v1/ingestion/events:
    post:
      summary: Ingest CRM/ChirpStack/DPL events into the backend pipeline
      operationId: ingestEvent
      tags: [ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../schemas/crm-event.schema.json'
      responses:
        '202':
          description: Event accepted for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionAccepted'
        '400':
          description: Invalid JSON or unsupported event type
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
        '422':
          description: Contract validation failed
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
  /v1/search/documents:
    get:
      summary: Query DPL content index for deterministic assistant/CRM retrieval
      operationId: searchDocuments
      tags: [search]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
        - in: query
          name: product_id
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
            enum:
              - initialized
              - site_survey
              - hardware_preparation
              - firmware_generate
              - lab_test
              - ready_for_installation
              - on_site_installation
              - testing
              - live
              - maintenance
        - in: query
          name: role
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
  /v1/exports/field-pack:
    post:
      summary: Request asynchronous field-pack export for one or more product variants
      operationId: createFieldPackExport
      tags: [export]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Export job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAccepted'
        '409':
          description: Duplicate idempotency key already in progress
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
        '422':
          description: Request failed contract validation
          content:
            application/json:
              schema:
                $ref: '../../schemas/error-envelope.schema.json'
components:
  schemas:
    IngestionAccepted:
      type: object
      additionalProperties: false
      required: [status, ingest_id, received_at]
      properties:
        status:
          type: string
          const: accepted
        ingest_id:
          type: string
        received_at:
          type: string
          format: date-time
    SearchResponse:
      type: object
      additionalProperties: false
      required: [status, query, results]
      properties:
        status:
          type: string
          const: ok
        query:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [doc_id, product_id, state, path]
            properties:
              doc_id:
                type: string
              product_id:
                type: string
              state:
                type: string
              path:
                type: string
              score:
                type: number
    ExportRequest:
      type: object
      additionalProperties: false
      required: [project_id, packages]
      properties:
        project_id:
          type: string
        idempotency_key:
          type: string
        packages:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [product_id, variant]
            properties:
              product_id:
                type: string
              variant:
                type: string
              roles:
                type: array
                items:
                  type: string
    ExportAccepted:
      type: object
      additionalProperties: false
      required: [status, export_job_id, queued_at]
      properties:
        status:
          type: string
          const: accepted
        export_job_id:
          type: string
        queued_at:
          type: string
          format: date-time
